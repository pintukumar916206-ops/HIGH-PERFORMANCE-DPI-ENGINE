global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "dpi-engine-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "dpi_rules.yml"

scrape_configs:
  - job_name: "dpi-engine"
    static_configs:
      - targets: ["dpi-engine:5000"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.+):\d+'
        target_label: __address__
        replacement: "${1}:9100"
