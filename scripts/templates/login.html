<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Network Analysis Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #090e1a;
      --surface:   #111827;
      --card:      #1a2236;
      --border:    rgba(255,255,255,0.07);
      --primary:   #3b82f6;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --dim:       #94a3b8;
      --red:       #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .login-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--dim);
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      margin-top: 1rem;
    }
    .btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
    }
    #error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--red);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      display: none;
      text-align: center;
    }
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <span class="brand">Network analysis engine</span>
    <h1>Sign In</h1>
  </div>

  <div id="error-msg"></div>

  <form id="login-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">ACCESS DASHBOARD</button>
  </form>

  <div class="footer">
    Production Hardened Environment
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');
    
    errorMsg.style.display = 'none';

    try {
      const response = await fetch('/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ username, password }),
      });

      const data = await response.json();

      if (response.ok) {
        window.location.href = '/';
      } else {
        errorMsg.textContent = data.message || 'Invalid credentials';
        errorMsg.style.display = 'block';
      }
    } catch (error) {
      errorMsg.textContent = 'Server connection error';
      errorMsg.style.display = 'block';
    }
  });
</script>

</body>
</html>
